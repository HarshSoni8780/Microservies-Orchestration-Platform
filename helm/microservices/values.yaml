namespace: microservices

api:
  replicaCount: 2
  image:
    repository: api-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

postgres:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: "16-alpine"
  storage: 5Gi
  storageClass: ""

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: api.local
      paths:
        - path: /
          pathType: Prefix
  # tls: []

loadBalancer:
  enabled: false

config:
  nodeEnv: production
  port: "3000"
  dbHost: postgres-service
  dbPort: "5432"
  dbName: appdb

secret:
  # Override in production via --set-file or external secrets
  postgresPassword: "change-me-in-production"
