# In production, replace with sealed-secrets or external secret manager.
# Create real secret: kubectl create secret generic db-credentials -n microservices \
#   --from-literal=POSTGRES_PASSWORD=<password> --from-literal=PGPASSWORD=<password>
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: microservices
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-in-production"
  PGPASSWORD: "change-me-in-production"

# converts stringData(human-readable) encodes to base64
