# used for reverse-proxy -> routes http request traffic from api.local to api-service using nginx ingress

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: microservices
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80
  # Optional: TLS (uncomment and add your secret for production)
  # tls:
  #   - hosts:
  #       - api.local
  #     secretName: api-tls
---
# Optional: LoadBalancer for direct external access (e.g. cloud)
apiVersion: v1
kind: Service
metadata:
  name: api-service-lb
  namespace: microservices
  labels:
    app: api-service
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: api-service
